# Lightweight Secure Chroma Proxy — runnable sample
#
# Two services on a private network:
#   * chroma — ChromaDB, requires its static service token, NEVER published to the host.
#   * proxy  — OSS nginx: terminates TLS, enforces the read/write allow-list, injects
#              Chroma's token upstream. Published ONLY on 127.0.0.1:8443.
#
# Bring up:  ../scripts/gen-cert.sh   &&  docker compose up -d
# Smoke test: ../scripts/smoke-test.sh
#
# Env comes from .env (copy .env.example -> .env). COMPOSE_PROJECT_NAME keeps this
# demo namespaced (lwcp-demo) so it never collides with other stacks.

name: ${COMPOSE_PROJECT_NAME:-lwcp-demo}

services:
  chroma:
    image: chromadb/chroma:1.5.0
    restart: unless-stopped
    environment:
      # Require the single static token for every request. All-or-nothing by design —
      # the proxy is what turns this one token into two roles.
      CHROMA_SERVER_AUTHN_PROVIDER: "chromadb.auth.token_authn.TokenAuthenticationServerProvider"
      CHROMA_SERVER_AUTHN_CREDENTIALS: "${CHROMA_TOKEN:?CHROMA_TOKEN must be set in .env}"
    volumes:
      - chroma-data:/data
    networks:
      - lwcp
    # Deliberately NO `ports:` — Chroma is reachable only from inside the lwcp network,
    # exclusively via the proxy. It is never exposed to the host.
    expose:
      - "8000"
    # No Docker healthcheck: the chromadb/chroma image is minimal (no curl / wget /
    # python / nc on PATH), so an in-container HTTP probe isn't possible. Readiness
    # is polled client-side instead (see scripts/smoke-test.sh), and nginx tolerates
    # a not-yet-ready upstream (it returns 502 until Chroma accepts connections).

  proxy:
    image: nginx:1.27
    restart: unless-stopped
    depends_on:
      chroma:
        condition: service_started
    ports:
      # Edge TLS, loopback only. NOT 8000 (that belongs to other local services) and
      # NOT 0.0.0.0 — bind to 127.0.0.1 so the demo never leaves this host.
      - "127.0.0.1:${PROXY_TLS_PORT:-8443}:8443"
    environment:
      # The upstream Chroma service token the proxy injects on every request.
      CHROMA_TOKEN: "${CHROMA_TOKEN:?CHROMA_TOKEN must be set in .env}"
      # nginx's built-in template step renders /etc/nginx/templates/*.template -> here.
      # Point it at /etc/nginx so nginx.conf.template becomes /etc/nginx/nginx.conf, and
      # FILTER=CHROMA so ONLY $CHROMA_* is substituted — nginx's own $request_method,
      # $http_authorization, etc. are left untouched.
      NGINX_ENVSUBST_OUTPUT_DIR: "/etc/nginx"
      NGINX_ENVSUBST_FILTER: "CHROMA"
    volumes:
      # nginx.conf is a template: `${CHROMA_TOKEN}` is substituted at container start
      # by nginx's built-in envsubst step (templates dir -> /etc/nginx/nginx.conf).
      - ./nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./nginx/writer_tokens.map:/etc/nginx/writer_tokens.map:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - lwcp

networks:
  lwcp:
    driver: bridge

volumes:
  chroma-data:
